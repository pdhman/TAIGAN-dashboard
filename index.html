<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAIGAN 포트폴리오 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:20px 32px}
  h1{font-size:24px;font-weight:600;margin-bottom:4px;text-align:center}
  .subtitle{font-size:14px;color:#888;margin-bottom:24px;text-align:center}
  .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
  .panel{background:#fff;border-radius:14px;padding:32px;border:0.5px solid #ddd}
  .panel-title{font-size:20px;font-weight:600;margin-bottom:20px;border-bottom:2px solid #333;padding-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .tab-buttons button{background:none;border:1px solid #ccc;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:13px}
  .tab-buttons button.active{background:#333;color:#fff;border-color:#333}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
  .metric-card{background:#ebebea;border-radius:10px;padding:16px 20px}
  .metric-label{font-size:13px;color:#666;margin-bottom:6px}
  .metric-value{font-size:24px;font-weight:500}
  .metric-sub{font-size:13px;margin-top:4px;color:#888}
  .pos{color:#e24b4a}.neg{color:#378add}
  .section-title{font-size:15px;font-weight:600;color:#444;margin-bottom:12px}
  .stock-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #ddd}
  .stock-code{font-size:12px;color:#999;min-width:72px}
  .stock-name{font-size:14px;color:#1a1a1a;min-width:130px}
  .bar-bg{flex:1;height:8px;background:#ddd;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px}
  .stock-ret{font-size:14px;font-weight:500;min-width:60px;text-align:right}
  .chart-wrap{position:relative;height:280px}
  .tab-content{display:none}
  .tab-content.active{display:block}
</style>
</head>
<body>
  <h1>TAIGAN 포트폴리오 대시보드</h1>
  <p class="subtitle">04/13 → 04/21&nbsp;|&nbsp;마지막 갱신: 2026-04-22 03:50:01</p>

  <div class="main-grid">
    <!-- F6 영역 -->
    <div class="panel">
      <div class="panel-title" style="color:#e24b4a;">
        F6 포트폴리오
        <div class="tab-buttons">
          <button class="active" onclick="switchTab('f6', 'main')">Main</button>
          <button onclick="switchTab('f6', 'hd')">HD</button>
        </div>
      </div>
      
      <div id="f6-main" class="tab-content active">
        <div class="grid-2">
          <div class="metric-card"><p class="metric-label">기간 평균 수익률</p><p class="metric-value pos" id="f6-total">-</p></div>
          <div class="metric-card"><p class="metric-label">상승/하락 종목</p><p class="metric-value" id="f6-updown">-</p></div>
        </div>
        <div style="margin-bottom: 28px"><p class="section-title">일별 평균 수익률 추이</p><div class="chart-wrap"><canvas id="f6-line"></canvas></div></div>
        <div><p class="section-title">종목별 상세 수익률</p><div id="f6-bars"></div></div>
      </div>
      
      <div id="f6-hd" class="tab-content">
        <div class="grid-2">
          <div class="metric-card"><p class="metric-label">기간 평균 수익률</p><p class="metric-value pos" id="f6-hd-total">-</p></div>
          <div class="metric-card"><p class="metric-label">상승/하락 종목</p><p class="metric-value" id="f6-hd-updown">-</p></div>
        </div>
        <div style="margin-bottom: 28px"><p class="section-title">일별 평균 수익률 추이</p><div class="chart-wrap"><canvas id="f6-hd-line"></canvas></div></div>
        <div><p class="section-title">종목별 상세 수익률</p><div id="f6-hd-bars"></div></div>
      </div>
    </div>

    <!-- P7 영역 -->
    <div class="panel">
      <div class="panel-title" style="color:#378add;">
        P7 포트폴리오
        <div class="tab-buttons">
          <button class="active" onclick="switchTab('p7', 'main')">Main</button>
          <button onclick="switchTab('p7', 'hd')">HD</button>
        </div>
      </div>
      
      <div id="p7-main" class="tab-content active">
        <div class="grid-2">
          <div class="metric-card"><p class="metric-label">기간 평균 수익률</p><p class="metric-value pos" id="p7-total">-</p></div>
          <div class="metric-card"><p class="metric-label">상승/하락 종목</p><p class="metric-value" id="p7-updown">-</p></div>
        </div>
        <div style="margin-bottom: 28px"><p class="section-title">일별 평균 수익률 추이</p><div class="chart-wrap"><canvas id="p7-line"></canvas></div></div>
        <div><p class="section-title">종목별 상세 수익률</p><div id="p7-bars"></div></div>
      </div>

      <div id="p7-hd" class="tab-content">
        <div class="grid-2">
          <div class="metric-card"><p class="metric-label">기간 평균 수익률</p><p class="metric-value pos" id="p7-hd-total">-</p></div>
          <div class="metric-card"><p class="metric-label">상승/하락 종목</p><p class="metric-value" id="p7-hd-updown">-</p></div>
        </div>
        <div style="margin-bottom: 28px"><p class="section-title">일별 평균 수익률 추이</p><div class="chart-wrap"><canvas id="p7-hd-line"></canvas></div></div>
        <div><p class="section-title">종목별 상세 수익률</p><div id="p7-hd-bars"></div></div>
      </div>
    </div>
  </div>

<script>
const DATES=["04/13", "04/14", "04/15", "04/16", "04/17", "04/20", "04/21"],F6={"codes": ["A000660", "A108860", "A005930", "A361610", "A141080", "A015760", "A011790", "A302440", "A207940", "A340570"], "names": ["SK하이닉스", "셀바스AI", "삼성전자", "SK아이이테크놀로지", "리가켐바이오", "한국전력", "SKC", "SK바이오사이언스", "삼성바이오로직스", "티앤엘"], "prices": [[1040000, 1103000, 1136000, 1155000, 1128000, 1166000, 1224000], [13140, 13470, 13380, 15230, 14290, 14210, 14130], [201000, 206500, 211000, 217500, 216000, 214500, 219000], [22850, 22700, 22950, 23650, 24200, 24700, 26650], [188800, 181000, 193000, 198000, 197400, 200000, 194100], [42200, 44350, 44350, 45800, 45900, 46100, 46000], [96000, 96800, 99800, 122000, 113700, 108900, 110300], [41650, 42200, 43850, 44650, 46600, 44750, 44200], [1550000, 1536000, 1602000, 1616000, 1601000, 1605000, 1588000], [57300, 57100, 59600, 63400, 65500, 63800, 61300]]},F6_HD={"codes": ["A009450", "A257720", "A259960", "A067160", "A195940", "A071050", "A008770", "A005850", "A041510", "A066970"], "names": ["경동나비엔", "실리콘투", "크래프톤", "SOOP", "HK이노엔", "한국금융지주", "호텔신라", "에스엘", "에스엠", "엘앤에프"], "prices": [[69500, 69600, 69100, 70000, 69600, 68300, 68700], [46900, 46350, 46800, 46900, 47100, 47150, 48700], [241500, 239000, 244000, 256500, 263500, 261500, 255000], [58800, 59600, 60100, 60600, 60100, 60100, 60100], [48500, 48600, 52400, 52900, 52300, 51400, 51800], [246000, 257500, 255000, 257000, 257000, 261000, 262000], [48550, 48550, 49850, 53800, 52900, 53300, 53900], [55300, 58100, 58500, 60200, 61200, 61000, 64900], [85800, 88000, 90900, 97000, 94700, 93000, 92200], [181700, 173400, 170600, 169500, 185600, 183700, 196400]]},P7={"codes": ["A047040", "A298380", "A336260", "A307950", "A214370", "A007660", "A028050", "A034020", "A090460", "A006360"], "names": ["대우건설", "에이비엘바이오", "두산퓨얼셀", "현대오토에버", "케어젠", "이수페타시스", "삼성E&A", "두산에너빌리티", "비에이치", "GS건설"], "prices": [[28500, 28600, 28700, 28100, 32850], [163800, 163900, 161500, 160200, 155900], [43900, 46000, 46050, 42600, 43350], [416000, 437000, 432000, 423000, 442500], [100000, 99100, 101300, 98800, 92600], [123200, 122700, 120300, 133300, 133200], [52400, 50400, 49550, 49300, 51700], [104200, 110800, 108500, 111000, 115700], [23950, 29200, 31400, 33050, 33850], [41000, 39550, 39000, 38050, 43100]]},P7_HD={"codes": ["A066970", "A078600", "A183300", "A071050", "A278470", "A103140", "A000660", "A011070", "A005440", "A298020"], "names": ["엘앤에프", "대주전자재료", "코미코", "한국금융지주", "에이피알", "풍산", "SK하이닉스", "LG이노텍", "현대지에프홀딩스", "효성티앤씨"], "prices": [[170600, 169500, 185600, 183700, 196400], [136000, 132500, 132800, 130000, 149400], [131900, 151000, 154900, 152900, 152500], [255000, 257000, 257000, 261000, 262000], [413000, 414500, 419500, 414500, 410000], [100600, 102100, 101900, 100800, 99900], [1136000, 1155000, 1128000, 1166000, 1224000], [383000, 379000, 394000, 409500, 425000], [13520, 14590, 14080, 14230, 15280], [500000, 500000, 487500, 525000, 527000]]};
function calcReturns(p){return p.prices.map(r=>(r[r.length-1]-r[0])/r[0]*100)}
function calcDailyAvg(p){return DATES.map((_,di)=>parseFloat((p.prices.reduce((s,r)=>s+(r[di]-r[0])/r[0]*100,0)/p.prices.length).toFixed(2)))}
function fmtRet(v){return(v>=0?'+':'')+v.toFixed(2)+'%'}
function renderBars(id,p,rets){const max=Math.max(...rets.map(Math.abs), 0.01);document.getElementById(id).innerHTML=rets.map((r,i)=>({r,i})).sort((a,b)=>b.r-a.r).map(({r,i})=>`<div class="stock-row"><span class="stock-code">${p.codes[i].replace('A',(x,o)=>o===0?'':'A')}</span><span class="stock-name">${p.names[i]}</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.abs(r)/max*100}%;background:${r>=0?'#e24b4a':'#378add'}"></div></div><span class="stock-ret ${r>=0?'pos':'neg'}"> ${fmtRet(r)}</span></div>`).join('')}
function renderMetrics(px,rets){const avg=rets.reduce((a,b)=>a+b,0)/rets.length,el=document.getElementById(px+'-total');el.textContent=fmtRet(avg);el.className='metric-value '+(avg>=0?'pos':'neg');const up=rets.filter(r=>r>=0).length;document.getElementById(px+'-updown').textContent=up+' 상승 / '+(rets.length-up)+' 하락'}

const f6r=calcReturns(F6), f6hdr=calcReturns(F6_HD), p7r=calcReturns(P7), p7hdr=calcReturns(P7_HD);
const f6d=calcDailyAvg(F6), f6hdd=calcDailyAvg(F6_HD), p7d=calcDailyAvg(P7), p7hdd=calcDailyAvg(P7_HD);

renderMetrics('f6',f6r); renderBars('f6-bars',F6,f6r);
renderMetrics('f6-hd',f6hdr); renderBars('f6-hd-bars',F6_HD,f6hdr);
renderMetrics('p7',p7r); renderBars('p7-bars',P7,p7r);
renderMetrics('p7-hd',p7hdr); renderBars('p7-hd-bars',P7_HD,p7hdr);

const sc={x:{ticks:{font:{size:11},autoSkip:false},grid:{color:'rgba(0,0,0,0.06)'}},y:{ticks:{font:{size:11},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(0,0,0,0.06)'}}}
function mkLine(id,data,color){new Chart(document.getElementById(id),{type:'line',data:{labels:DATES,datasets:[{data,borderColor:color,backgroundColor:color+'22',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:color,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}})}

mkLine('f6-line',f6d,'#e24b4a'); mkLine('f6-hd-line',f6hdd,'#e24b4a');
mkLine('p7-line',p7d,'#378add'); mkLine('p7-hd-line',p7hdd,'#378add');

function switchTab(panel, tab) {
  document.querySelectorAll(`#${panel}-main, #${panel}-hd`).forEach(el => el.classList.remove('active'));
  document.getElementById(`${panel}-${tab}`).classList.add('active');
  const btns = document.querySelector(`.panel-title[style*="${panel === 'f6' ? '#e24b4a' : '#378add'}"]`).querySelectorAll('button');
  btns[0].classList.toggle('active', tab === 'main');
  btns[1].classList.toggle('active', tab === 'hd');
}
</script>
</body></html>
